                            <Route path="/user/:id" element={<UserProfileScreen />} />
                        </Routes>
                    </div>
                </MemoryRouter>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
